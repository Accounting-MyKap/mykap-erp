name: Test Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-client:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'
        cache-dependency-path: client/package-lock.json
    
    - name: Install Client dependencies
      run: |
        cd client
        npm ci
    
    - name: Build Client
      run: |
        cd client
        npm run build
    
    - name: Test Client build
      run: |
        cd client
        ls -la dist/
        echo "✅ Client build successful!"
    
  test-api:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'
        cache-dependency-path: api/package-lock.json
    
    - name: Install API dependencies
      run: |
        cd api
        npm ci
    
    - name: Build API
      run: |
        cd api
        npm run build
    
    - name: Test API build
      run: |
        cd api
        ls -la dist/
        echo "✅ API build successful!" 